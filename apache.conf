# /etc/apache2/sites-available/postgresql.istanbul.conf
# (or /etc/httpd/conf.d/postgresql.istanbul.conf on RHEL/AlmaLinux)
#
# Required modules: mod_rewrite, mod_ssl, mod_headers
# Enable on Debian/Ubuntu: a2enmod rewrite ssl headers
# Then: a2ensite postgresql.istanbul && systemctl reload apache2

# ── HTTP → HTTPS redirect ──────────────────────────────────────
<VirtualHost *:80>
    ServerName  postgresql.istanbul
    ServerAlias www.postgresql.istanbul

    RewriteEngine On
    RewriteRule ^ https://%{HTTP_HOST}%{REQUEST_URI} [R=301,L]
</VirtualHost>

# ── HTTPS ──────────────────────────────────────────────────────
<VirtualHost *:443>
    ServerName  postgresql.istanbul
    ServerAlias www.postgresql.istanbul

    # Let's Encrypt – managed by Certbot
    SSLEngine on
    SSLCertificateFile    /etc/letsencrypt/live/postgresql.istanbul/fullchain.pem
    SSLCertificateKeyFile /etc/letsencrypt/live/postgresql.istanbul/privkey.pem
    SSLProtocol           all -SSLv3 -TLSv1 -TLSv1.1
    SSLCipherSuite        HIGH:!aNULL:!MD5

    # Document root – public/ only exposed to the web
    DocumentRoot /var/www/html/postgresql.istanbul/public
    DirectoryIndex index.php index.html

    AddDefaultCharset utf-8

    # ── Security headers ──────────────────────────────────────
    Header always set X-Frame-Options "SAMEORIGIN"
    Header always set X-Content-Type-Options "nosniff"
    Header always set Referrer-Policy "strict-origin-when-cross-origin"
    Header always set X-XSS-Protection "1; mode=block"

    # ── Public dir ────────────────────────────────────────────
    <Directory /var/www/html/postgresql.istanbul/public>
        Options +FollowSymLinks -Indexes
        AllowOverride None
        Require all granted

        RewriteEngine On
        RewriteCond %{REQUEST_FILENAME} !-f
        RewriteCond %{REQUEST_FILENAME} !-d
        RewriteRule ^ index.php [L]
    </Directory>

    # ── Admin panel ───────────────────────────────────────────
    Alias /assets /var/www/html/postgresql.istanbul/assets
    Alias /admin /var/www/html/postgresql.istanbul/admin

    <Directory /var/www/html/postgresql.istanbul/admin>
        Options +FollowSymLinks -Indexes
        AllowOverride None
        Require all granted

        RewriteEngine On
        RewriteCond %{REQUEST_FILENAME} !-f
        RewriteCond %{REQUEST_FILENAME} !-d
        RewriteRule ^ index.php [L]
    </Directory>

    # ── Static assets – long cache ────────────────────────────
    <Directory /var/www/html/postgresql.istanbul/assets>
        Options -Indexes +FollowSymLinks
        AllowOverride None
        Require all granted
        Header set Cache-Control "max-age=2592000, public"
    </Directory>

    # ── Protect includes/ (belt-and-suspenders; not in docroot) ─
    # includes/ lives outside public/ so Apache never serves it,
    # but add an explicit deny in case the layout changes:
    <DirectoryMatch "^/var/www/html/postgresql.istanbul/includes">
        Require all denied
    </DirectoryMatch>

    # ── Deny hidden files ─────────────────────────────────────
    <FilesMatch "^\.">
        Require all denied
    </FilesMatch>

    # ── Logs ──────────────────────────────────────────────────
    ErrorLog  /var/log/apache2/postgresql.istanbul.error.log
    CustomLog /var/log/apache2/postgresql.istanbul.access.log combined
</VirtualHost>
